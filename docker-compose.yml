# ===========================================
# ISO 体系智能审核系统 - Docker Compose 配置
# ===========================================

name: audit-project

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-backend
    env_file:
      - .env
    volumes:
      # 上传文件持久化
      - uploads_data:/app/backend/uploads
      # 数据库文件持久化（bind mount）
      - ./backend/audit_batches.db:/app/backend/audit_batches.db
      # 匹配字典持久化（bind mount，支持动态修改）
      - ./backend/element_routing_dictionary_final.json:/app/backend/element_routing_dictionary_final.json
    expose:
      - "8000"
    restart: unless-stopped
    environment:
      # 时区设置
      - TZ=Asia/Shanghai
      # 目录路径配置（覆盖默认值）
      - UPLOAD_DIR=/app/backend/uploads
      - DATA_DIR=/app/backend/data
      - DB_FILE=/app/backend/audit_batches.db
      # ROUTING_DICT_PATH 由 config.py 自动计算，无需设置
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - audit-network

  # 前端服务（Nginx）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audit-frontend
    ports:
      - "8081:80"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - audit-network

# Docker volumes 用于数据持久化
volumes:
  uploads_data:

# 内部网络，前后端互通
networks:
  audit-network:
    driver: bridge